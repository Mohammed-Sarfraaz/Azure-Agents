name: Build and Deploy DevOps Agent to AKS

on:
  push:
    branches:
      - main
    paths:
      - 'docker/**'
      - 'k8s/**'
      - '.github/workflows/deploy-devops-agent.yml'
  workflow_dispatch:
    inputs:
      replicas:
        description: 'Number of agent replicas'
        required: false
        default: '1'

env:
  AGENT_IMAGE_NAME: devops-agent
  REGISTRY_URL: ${{ secrets.ACR_LOGIN_SERVER }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure CLI login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          ACR_NAME=$(echo ${{ env.REGISTRY_URL }} | cut -d'.' -f1)
          az acr login --name $ACR_NAME

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.AGENT_IMAGE_NAME }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.AGENT_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY_URL }}/${{ env.AGENT_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_URL }}/${{ env.AGENT_IMAGE_NAME }}:buildcache,mode=max

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --admin \
            --overwrite-existing

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure CLI login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --admin \
            --overwrite-existing

      - name: Create namespace
        run: |
          kubectl create namespace azure-devops-agents --dry-run=client -o yaml | kubectl apply -f -

      - name: Create DevOps Agent Secret
        run: |
          kubectl create secret generic devops-agent-secret \
            --from-literal=org-url="${{ secrets.AZURE_DEVOPS_ORG_URL }}" \
            --from-literal=pat-token="${{ secrets.AZURE_DEVOPS_PAT_TOKEN }}" \
            -n azure-devops-agents \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update deployment image
        run: |
          sed -i 's|<ACR_LOGIN_SERVER>|${{ env.REGISTRY_URL }}|g' k8s/devops-agent-deployment.yaml
          sed -i 's|devops-agent:latest|devops-agent:${{ github.sha }}|g' k8s/devops-agent-deployment.yaml

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/devops-agent-deployment.yaml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/azure-devops-agent -n azure-devops-agents --timeout=5m

      - name: Check pod status
        if: always()
        run: |
          echo "Pod Status:"
          kubectl get pods -n azure-devops-agents
          echo ""
          echo "Pod Logs:"
          kubectl logs -n azure-devops-agents -l app=azure-devops-agent --tail=50 || true
